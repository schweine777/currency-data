name: Update Daily Last Currency
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas lxml pytz html5lib

      - name: Run script with retry
        id: run_script
        run: |
          cd script
          success=false
          for i in {1..10}
          do
            echo "Attempt $i of 10..."
            if python fetch_currency.py; then
              success=true
              break
            else
              echo "Attempt $i failed."
              if [ $i -lt 10 ]; then
                echo "Retrying in 5 minutes..."
                sleep 300
              fi
            fi
          done

          if [ "$success" = false ]; then
            echo "All 10 attempts failed."
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add script/data/*.json
          git commit -m "Auto-update currency data for $(date +'%Y-%m-%d')" || exit 0
          git push

      - name: Send Telegram notification on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ⚠️ [Currency Data Update Failed]
            The exchange rate update task failed after 10 attempts.
            Please check the GitHub Actions logs for details.
            Repo: ${{ github.repository }}
