name: Generate Currency Graphs

on:
  workflow_dispatch: # 수동으로 실행할 때만 작동

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 리포지토리에 커밋할 수 있는 권한 부여
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run graph generator
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd script
          python generate_graph.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add script/graph/
          
          # 변경 사항이 있는 경우에만 커밋 및 푸시
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update currency graphs [skip ci]"
            git push
          fi

      - name: Send Telegram notification on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ⚠️ [Currency Graph Generation Failed]
            The graph generation task failed.
            Please check the GitHub Actions logs for details.
            Repo: ${{ github.repository }}
